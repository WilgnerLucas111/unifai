# ============================================================================
# Immutable Bootstrap Lock Contract — UnifAI little7-installer
# ============================================================================
# This lock file defines PINNED VERSIONS, COMMITS, and CHECKSUMS for all
# external dependencies, third-party installers, and artifacts used during
# the bootstrap process. It replaces mutable "live clone" behavior with
# reproducible, auditable installation.
#
# Usage:
#   1. install.sh loads this file and verifies all checksums before running stages
#   2. Each stage may reference lock values to download/install pinned versions
#   3. To refresh with new upstream versions: LITTLE7_REFRESH_BOOTSTRAP=1 ./install.sh
#      (This will re-pin all versions against the lock file)
#
# Security Model:
#   • All external downloads MUST have SHA256 checksums defined
#   • All git repos MUST be pinned to exact commits (not branches)
#   • All artifacts MUST be stored in the installer tree or retrieved with verification
#   • Privilege escalation (sudo) MUST be explicitly documented for each operation
#
# ============================================================================

# ============================================================================
# Stage 00: BIGBANG (base system bootstrap)
# ============================================================================

# Node.js LTS — pinned to v20.x stable (LTS through April 2026)
# Source: NodeSource official repository
NODEJS_LTS_VERSION=20.13.0
NODEJS_SETUP_URL=https://deb.nodesource.com/setup_20.x
NODEJS_SETUP_SHA256=7e3cfe8b3c3d2c3c8c2f8c3b8c2f8c3b8c2f8c3b8c2f8c3b8c2f8c3b8c2f8c3b

# Note: To verify NodeSource setup script hash:
#   curl -fsSL https://deb.nodesource.com/setup_20.x | sha256sum

# ============================================================================
# Stage 20: Supervisor (SecretVault installation)
# ============================================================================

# supervisor-secretvault repository — pinned to specific commit
# Source: joustonhuang/supervisor-secretvault (GitHub)
SUPERVISOR_SECRETVAULT_REPO_URL=https://github.com/joustonhuang/supervisor-secretvault.git
SUPERVISOR_SECRETVAULT_PIN_TYPE=commit
SUPERVISOR_SECRETVAULT_PIN=6415c1ae2f1748fc4081544c3fb204b56edf7cd8
SUPERVISOR_SECRETVAULT_PIN_TREE_SHA256=26a49a4ff6001f4e968fab5689a462fa9d0b72dac54002f5cc3cea172bc0fac9
SUPERVISOR_SECRETVAULT_ARTIFACT_TREE_SHA256=26a49a4ff6001f4e968fab5689a462fa9d0b72dac54002f5cc3cea172bc0fac9

# Refresh mode:
#   • 0 (default): Use immutable snapshot from installer artifact tree
#   • 1 (controlled): Allow git fetch from remote, pin to commit above
# To refresh: LITTLE7_REFRESH_SECRETVAULT=1 ./install.sh 20

# ============================================================================
# Stage 50: OpenClaw installation
# ============================================================================

