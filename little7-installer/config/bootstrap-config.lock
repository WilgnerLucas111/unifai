# ============================================================================
# Integration Notes
# ============================================================================

# Master Key Bootstrap (Stage 20):
#   • Generated via: openssl rand -hex 32
#   • Stored at: /etc/little7/secretvault_master.key (perms: 0600)
#   • Access: Root-only, cached in Stage 20 manifest
#   • Rotation: Manual process via separate runbook

# API Key Injection (Stage 21):
#   • Method: Environment file (0600 perms) or TTY prompt
#   • Storage: Encrypted within SecretVault (AES-256-GCM)
#   • Audit: Logged via systemd-journald and auditd
#   • Expiry: None (credentials maintained until revoked upstream)

# OpenClaw Runtime (Stage 50):
#   • Provider detection: openclaw-start launcher probes SecretVault
#   • Fallback chain: openai-oauth → codex-oauth → error
#   • Process isolation: exec env -i (clean environment, no leaks)
#   • Core dump prevention: ulimit -c 0

# Docker Runtime (Stage 31):
#   • Daemon management: sudo systemctl (install phase only)
#   • Container lifecycle: docker-compose CLI (service user)
#   • Network isolation: compose.yml defines networks
#   • Restart policy: unless-stopped (auto-recover on failure)
